<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WhatsApp Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Dark Mode Palette */
            --primary-color: #00a884;
            --primary-dark: #008f6f;
            --secondary-bg: #0b141a;
            /* Global App Background */
            --chat-bg: #0b141a;
            /* Chat Area Background */
            --sidebar-bg: #111b21;
            /* Sidebar Background */
            --sidebar-text: #e9edef;
            --sidebar-hover: #2a3942;
            --message-out: #005c4b;
            /* Deep Green for sent messages */
            --message-in: #202c33;
            /* Dark Gray for received messages */
            --text-main: #e9edef;
            /* Light text */
            --text-secondary: #8696a0;
            /* Muted text */
            --surface-bg: #202c33;
            /* Cards, Modals, Inputs */
            --border-color: #2a3942;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--surface-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
            font-size: 3rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 12px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
        }

        /* Form inputs dark mode adjustments */
        .form-control {
            background-color: var(--secondary-bg);
            border-color: var(--border-color);
            color: var(--text-main);
        }

        .form-control:focus {
            background-color: var(--secondary-bg);
            color: var(--text-main);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(0, 168, 132, 0.25);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="brand-logo">
            <i class="bi bi-whatsapp"></i>
        </div>
        <h4 class="text-center mb-4">Login to Dashboard</h4>
        <div id="error-msg" class="alert alert-danger d-none" role="alert"></div>
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.message || 'Login failed';
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                errorDiv.textContent = 'An error occurred. Please try again.';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
